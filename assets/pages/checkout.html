<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar Compra - Hytale War Brasil</title>
    <link
      rel="icon"
      type="image/webp"
      href="https://lezyskkgqzzuqycngsod.supabase.co/storage/v1/object/public/war-assets/img/logo-oficial.webp"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/index.css" />
  </head>
  <body class="bg-[#050810] text-white font-sans">
    <nav
      class="w-full bg-slate-900/80 backdrop-blur-lg border-b border-yellow-600/20 py-4 px-4 sm:px-6 flex justify-between items-center gap-4"
    >
      <div class="flex items-center gap-3 min-w-0">
        <img
          src="https://lezyskkgqzzuqycngsod.supabase.co/storage/v1/object/public/war-assets/img/logo-oficial.webp"
          alt="Logo Hytale War"
          class="h-10"
        />
        <span
          class="font-fantasy text-yellow-500 uppercase tracking-normal truncate"
          >Hytale War</span
        >
      </div>
      <a
        href="/index.html"
        class="text-gray-400 hover:text-white text-xs uppercase font-bold transition text-right"
      >
        <i class="fas fa-arrow-left mr-2"></i> Voltar para a Loja
      </a>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-10 sm:py-12">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 lg:gap-12">
        <div class="lg:col-span-2 space-y-8">
          <section
            class="bg-slate-900/40 border border-white/5 p-5 sm:p-8 rounded-2xl"
          >
            <h2
              class="text-lg sm:text-xl font-fantasy text-yellow-500 uppercase mb-6 flex items-center gap-3"
            >
              <i class="fas fa-user-circle"></i> 1. Identificação no Servidor
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label
                  for="nick"
                  class="block text-xs text-gray-500 uppercase font-bold mb-2"
                  >Seu Nick (In-game)</label
                >
                <input
                  id="nick"
                  type="text"
                  placeholder="Ex: Steve_Hytale"
                  autocomplete="nickname"
                  required
                  class="w-full bg-black/40 border border-white/10 rounded-lg py-3 px-4 focus:border-yellow-500 outline-none transition"
                />
              </div>
              <div>
                <label
                  for="email"
                  class="block text-xs text-gray-500 uppercase font-bold mb-2"
                  >E-mail para Recibo</label
                >
                <input
                  id="email"
                  type="email"
                  placeholder="seu@email.com"
                  autocomplete="email"
                  required
                  class="w-full bg-black/40 border border-white/10 rounded-lg py-3 px-4 focus:border-yellow-500 outline-none transition"
                />
              </div>
            </div>
          </section>

          <section
            class="bg-slate-900/40 border border-white/5 p-5 sm:p-8 rounded-2xl"
          >
            <h2
              class="text-lg sm:text-xl font-fantasy text-yellow-500 uppercase mb-6 flex items-center gap-3"
            >
              <i class="fas fa-credit-card"></i> 2. Forma de Pagamento
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div class="relative group">
                <input
                  id="pay-pix"
                  type="radio"
                  name="pay"
                  class="peer sr-only"
                  checked
                />
                <label
                  for="pay-pix"
                  class="block cursor-pointer p-4 border border-white/10 rounded-xl bg-black/20 peer-checked:border-yellow-500 peer-checked:bg-yellow-500/5 transition"
                >
                  <i class="fab fa-pix text-2xl text-cyan-400 mb-2"></i>
                  <span class="text-sm font-bold block">PIX</span>
                  <span class="text-[10px] text-gray-500 italic"
                    >Aprovação imediata</span
                  >
                </label>
              </div>
              <div class="relative group">
                <input
                  id="pay-card"
                  type="radio"
                  name="pay"
                  class="peer sr-only"
                />
                <label
                  for="pay-card"
                  class="block cursor-pointer p-4 border border-white/10 rounded-xl bg-black/20 peer-checked:border-yellow-500 peer-checked:bg-yellow-500/5 transition"
                >
                  <i class="fas fa-credit-card text-2xl text-blue-400 mb-2"></i>
                  <span class="text-sm font-bold block">Cartão</span>
                  <span class="text-[10px] text-gray-500 italic"
                    >Até 12x no MercadoPago</span
                  >
                </label>
              </div>
              <div class="relative group">
                <input
                  id="pay-boleto"
                  type="radio"
                  name="pay"
                  class="peer sr-only"
                />
                <label
                  for="pay-boleto"
                  class="block cursor-pointer p-4 border border-white/10 rounded-xl bg-black/20 peer-checked:border-yellow-500 peer-checked:bg-yellow-500/5 transition"
                >
                  <i class="fas fa-barcode text-2xl text-gray-400 mb-2"></i>
                  <span class="text-sm font-bold block">Boleto</span>
                  <span class="text-[10px] text-gray-500 italic"
                    >1 a 3 dias úteis</span
                  >
                </label>
              </div>
            </div>
          </section>
        </div>

        <aside class="lg:col-span-1">
          <div
            class="bg-slate-900 border border-yellow-600/20 p-5 sm:p-8 rounded-2xl lg:sticky lg:top-28 shadow-2xl"
          >
            <h2 class="text-lg font-fantasy text-white uppercase mb-6">
              Resumo da Compra
            </h2>

            <div
              id="checkout-items-list"
              class="space-y-4 mb-6 border-b border-white/5 pb-6"
            ></div>

            <div class="mb-6">
              <div class="flex flex-col sm:flex-row gap-2">
                <input
                  type="text"
                  id="cupom-input"
                  placeholder="Cupom de Desconto"
                  class="flex-1 bg-black/40 border border-white/10 rounded-lg py-2 px-3 text-xs outline-none focus:border-yellow-500"
                />
                <button
                  type="button"
                  class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-xs font-bold uppercase transition"
                >
                  Aplicar
                </button>
              </div>
            </div>

            <div class="space-y-2 mb-8">
              <div class="flex justify-between text-xs text-gray-500">
                <span>Subtotal</span>
                <span id="checkout-subtotal">R$ 0,00</span>
              </div>
              <div
                class="flex justify-between text-xl font-bold text-yellow-500 pt-2 border-t border-white/10"
              >
                <span>Total</span>
                <span id="checkout-total">R$ 0,00</span>
              </div>
            </div>

            <button
              id="finalizar-pagamento"
              type="button"
              onclick="processarPagamento()"
              class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-4 rounded-xl uppercase tracking-widest transition-all shadow-lg hover:shadow-yellow-500/20 active:scale-95"
            >
              <i class="fas fa-lock mr-2"></i> Finalizar Pagamento
            </button>

            <p
              class="text-[10px] text-center text-gray-500 mt-4 leading-relaxed"
            >
              Ao finalizar, você concorda com nossos <br />
              <a href="#" class="underline">Termos de Uso e Entrega</a>.
            </p>
          </div>
        </aside>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase-config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/checkout.js"></script>
  </body>
</html>
